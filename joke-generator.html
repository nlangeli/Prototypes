<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="css/joke-style.css">
</head>
<body>
    <div class="container">
        <div class="joke-card">
            <h1>😂 Joke Generator</h1>
            
            <div class="joke-display">
                <p id="joke-text" class="joke-text">Click the button to get a joke!</p>
                <p id="joke-type" class="joke-type"></p>
            </div>

            <div class="button-group">
                <button id="get-joke-btn" class="btn btn-primary">Get Joke</button>
                <button id="copy-btn" class="btn btn-secondary">Copy Joke</button>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Loading joke...</p>
            </div>

            <div id="error" class="error hidden"></div>

            <div class="joke-history">
                <h3>Recent Jokes</h3>
                <ul id="history-list" class="history-list"></ul>
                <button id="clear-history-btn" class="btn btn-small">Clear History</button>
            </div>
        </div>
    </div>

    <script src="js/joke-script.js"></script>
</body>
</html>
